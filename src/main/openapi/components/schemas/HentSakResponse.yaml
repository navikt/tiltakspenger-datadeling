description: |
  Response brukt kun av POST /vedtak/sak.
  Skiller seg fra Sak ved at den inneholder iverksattSoknadsbehandlingTidspunkt.
type: object
properties:
  sakId:
    type: string
  saksnummer:
    type: string
  kilde:
    type: string
  status:
    type: string
  opprettetDato:
    type: string
    format: date-time
  iverksattSoknadsbehandlingTidspunkt:
    description: |
      Tidspunktet første søknadsbehandling ble iverksatt for denne saken.
      Kan være null dersom det ikke finnes noen iverksatt søknadsbehandling enda,
      eller dersom kilden ikke har denne informasjonen (f.eks. Arena).
    type: [string, "null"]
    format: date-time
required:
- sakId
- saksnummer
- kilde
- status
- opprettetDato
- iverksattSoknadsbehandlingTidspunkt
