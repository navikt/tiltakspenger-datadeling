type: object
properties:
  kjedeId:
    type: string
  meldeperiodeId:
    type: string
  fraOgMed:
    type: string
    format: date
  tilOgMed:
    type: string
    format: date
  meldekortdager:
    type: array
    items:
      $ref: ./MeldekortDag.yaml
  status:
    type: string
    enum:
    - SENDT_TIL_UTBETALING
    - KORRIGERING
  totaltBelop:
    type: integer
    format: int32
  sats:
    type: integer
    format: int32
  satsBarnetillegg:
    type: [integer, "null"]
    format: int32
  korrigering:
    type: [object, "null"]
    properties:
      totalDifferanse:
        type: integer
        format: int32
      resultat:
        type: string
        enum:
        - OKNING
        - REDUKSJON
        - INGEN_ENDRING
    required:
    - totalDifferanse
    - resultat
required:
- kjedeId
- meldeperiodeId
- fraOgMed
- tilOgMed
- meldekortdager
- status
- totaltBelop
- sats
- satsBarnetillegg
- korrigering
