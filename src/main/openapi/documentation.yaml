    BehandlingResponse:
      $ref: ./components/schemas/BehandlingResponse.yaml
    TpsakBehandlingRespons:
      $ref: ./components/schemas/TpsakBehandlingRespons.yaml
    TpsakBehandling:
      $ref: ./components/schemas/TpsakBehandling.yaml
    Sak:
      $ref: ./components/schemas/Sak.yaml
    HentSakResponse:
      $ref: ./components/schemas/HentSakResponse.yaml
    VedtakDetaljerResponse:
