openapi: 3.1.1
info:
  title: tiltakspenger-datadeling API
  description: |
    API for å dele vedtak, behandlinger og meldekort for tiltakspenger
    mellom interne NAV-konsumenter og Arena.
  version: 1.0.0
servers:
- url: https://tiltakspenger-datadeling.intern.dev.nav.no
  description: Dev
tags:
- name: Arena
  description: Endepunkter som henter data fra Arena.
- name: Behandlinger
  description: Endepunkter for behandlinger i tiltakspenger-saksbehandling.
- name: Vedtak
  description: Endepunkter for vedtak og saker i tiltakspenger.
- name: Meldekort
  description: Endepunkter for meldekort i tiltakspenger.
paths:
  /arena/meldekort:
    $ref: ./paths/arena-meldekort.yaml
  /arena/utbetalingshistorikk:
    $ref: ./paths/arena-utbetalingshistorikk.yaml
  /arena/utbetalingshistorikk/detaljer:
    $ref: ./paths/arena-utbetalingshistorikk-detaljer.yaml
  /behandlinger/perioder:
    $ref: ./paths/behandlinger-perioder.yaml
  /behandlinger/apne:
    $ref: ./paths/behandlinger-apne.yaml
  /vedtak/detaljer:
    $ref: ./paths/vedtak-detaljer.yaml
  /vedtak/perioder:
    $ref: ./paths/vedtak-perioder.yaml
  /vedtak/tidslinje:
    $ref: ./paths/vedtak-tidslinje.yaml
  /vedtak/sak:
    $ref: ./paths/vedtak-sak.yaml
  /meldekort/detaljer:
    $ref: ./paths/meldekort-detaljer.yaml
components:
  schemas:
    VedtakReqDTO:
      $ref: ./components/schemas/VedtakReqDTO.yaml
    VedtakSakReqDTO:
      $ref: ./components/schemas/VedtakSakReqDTO.yaml
