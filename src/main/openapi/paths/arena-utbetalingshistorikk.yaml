post:
  tags:
  - Arena
  operationId: hentArenaUtbetalingshistorikk
  summary: Hent utbetalingshistorikk fra Arena
  description: Henter utbetalingshistorikk fra Arena for en gitt bruker i en gitt periode.
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/VedtakReqDTO.yaml
    required: true
  responses:
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/MappingError.yaml
    "401":
      description: Unauthorized
    "403":
      description: Forbidden
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/ArenaUtbetalingshistorikk.yaml
