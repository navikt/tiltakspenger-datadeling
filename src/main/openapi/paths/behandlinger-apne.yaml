post:
  tags:
  - Behandlinger
  operationId: hentApneBehandlinger
  summary: Hent åpne behandlinger
  description: Henter alle åpne behandlinger for en gitt bruker.
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/BehandlingRequest.yaml
    required: true
  responses:
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/MappingError.yaml
    "401":
      description: Unauthorized
    "403":
      description: Forbidden
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TpsakBehandlingRespons.yaml
