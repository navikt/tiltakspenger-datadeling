post:
  tags:
  - Meldekort
  operationId: hentMeldekortDetaljer
  summary: Hent detaljer for meldekort
  description: Henter meldekort klare til utfylling og godkjente meldekort for en gitt bruker i en gitt periode.
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/VedtakReqDTO.yaml
    required: true
  responses:
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/MappingError.yaml
    "401":
      description: Unauthorized
    "403":
      description: Forbidden
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/MeldekortResponse.yaml
